<style>
  :root {
    --bg: #F6E89A;             /* outer butter */
    --panel: #FBF6E1;          /* cream panel */
    --panel-2: #F5EFD8;        /* cream panel alt */
    --yellow: #F1D85A;         /* saturated yellow band */
    --yellow-soft: #F5E37A;
    --sage: #CDE0B5;           /* mint sage pill */
    --sage-dark: #A7C68F;
    --grid: #D7E8C7;           /* grid paper green */
    --grid-line: #A9C99A;
    --ink: #1A1A1A;            /* dark text */
    --ink-2: #3a382f;
    --muted: #7a766a;
    --coral: #E76F4F;          /* tiny accent */
    --rule: rgba(26,26,26,0.14);

    --serif: 'Instrument Serif', 'Times New Roman', serif;
    --cursive: 'Caveat', cursive;
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%; }
  body { overflow-x: hidden; }
  html { scroll-behavior: smooth; }
  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; }
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  /* page = framed canvas with butter outer */
  .page-frame {
    max-width: 1280px;
    margin: 0 auto;
    padding: 20px 20px 40px;
  }

  /* TOP CHROME */
  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 4px 14px;
  }
  .topnav-left { display: flex; align-items: center; gap: 14px; }
  .star-badge {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--ink); color: var(--panel);
    display: grid; place-items: center;
    font-family: var(--serif); font-style: italic; font-size: 18px;
  }
  .topnav-meta { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-2); }
  .topnav-links { display: flex; gap: 26px; font-size: 13px; font-weight: 500; }
  .topnav-links a { position: relative; padding-bottom: 2px; }
  .topnav-links a::after { content:''; position:absolute; left:0; right:100%; bottom:-2px; height:1.5px; background: var(--ink); transition: right 0.28s ease; }
  .topnav-links a:hover::after { right: 0; }
  .topnav-cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--ink); color: var(--panel);
    padding: 10px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
    transition: transform 0.2s ease;
    white-space: nowrap;
  }
  .topnav-cta:hover { transform: translateY(-1px); }
  .topnav-cta .dot { width:6px; height:6px; border-radius:50%; background: var(--sage); }

  /* HERO */
  .hero {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    aspect-ratio: 16/8.6;
    background: #c2b08a;
    isolation: isolate;
  }
  .hero.hero-solid {
    background: var(--hero-bg, #C75B3D);
  }
  .hero.hero-solid .hero-corner-r { color: rgba(251,246,225,0.7); }
  .hero-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: saturate(0.95) contrast(0.96);
  }
  .hero-img-tint {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.18) 100%);
    pointer-events: none;
  }
  .hero-corner {
    position: absolute; top: 22px; left: 22px;
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--sage); color: var(--ink);
    display: grid; place-items: center;
    font-family: var(--serif); font-style: italic; font-size: 18px;
    z-index: 4;
  }
  .hero-corner-r {
    position: absolute; top: 22px; right: 22px;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(255,255,255,0.9);
    z-index: 4;
  }
  .hero-title-wrap {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    z-index: 3;
  }
  .hero-title {
    font-family: var(--cursive);
    font-weight: 700;
    color: var(--yellow);
    font-size: clamp(80px, 16vw, 230px);
    line-height: 0.78;
    text-align: center;
    letter-spacing: -0.01em;
    text-shadow: 0 6px 30px rgba(0,0,0,0.18);
    transform: rotate(-2deg);
    white-space: nowrap;
  }
  .hero-title .second {
    display: block;
    margin-left: 1.2em;
    margin-top: -0.05em;
    color: var(--yellow);
  }
  .hero-pill {
    position: absolute;
    background: var(--panel);
    color: var(--ink);
    border-radius: 999px;
    padding: 10px 20px;
    font-size: 14px;
    font-family: var(--serif);
    font-style: italic;
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    z-index: 5;
    white-space: nowrap;
  }
  .hero-pill.left  { top: 58%; left: 14%; transform: rotate(-4deg); }
  .hero-pill.right { top: 28%; right: 12%; transform: rotate(3deg); background: var(--sage); }

  /* The portrait placeholder if no image dropped */
  .hero-placeholder {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 40%, #d6c69a 0%, #8a7b5a 50%, #3a2f20 100%);
    display: grid; place-items: center;
  }
  .hero-placeholder::after {
    content: 'Drop your hero photo here →  scroll down for image slots';
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }

  /* SECTION: EMPOWERING */
  .panel-section {
    background: var(--panel);
    padding: 90px 70px 70px;
    position: relative;
  }
  .empowering-row {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    gap: 36px;
    margin-bottom: 36px;
  }
  .portrait-circle {
    width: 84px; height: 84px;
    border-radius: 50%;
    overflow: hidden;
    background: #d8c4a0;
    flex-shrink: 0;
    position: relative;
  }
  .empowering-h {
    font-family: var(--serif);
    font-size: clamp(40px, 5.2vw, 72px);
    line-height: 1.02;
    letter-spacing: -0.01em;
    color: var(--ink);
    font-weight: 400;
  }
  .empowering-h .chip {
    display: inline-block;
    background: var(--sage);
    border-radius: 999px;
    padding: 0.05em 0.42em;
    font-style: italic;
    margin: 0 0.08em;
    transform: translateY(-0.04em);
  }
  .empowering-body {
    display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
    max-width: 760px;
    margin-left: auto;
    font-size: 13px;
    line-height: 1.65;
    color: var(--ink-2);
  }
  .empowering-cta {
    display: flex; justify-content: flex-end;
    margin-top: 28px;
  }
  .btn-pill-sage {
    background: var(--sage);
    color: var(--ink);
    padding: 12px 26px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.2s ease, transform 0.2s ease;
    border: 1px solid rgba(26,26,26,0.06);
    white-space: nowrap;
  }
  .btn-pill-sage:hover { background: var(--sage-dark); transform: translateY(-1px); }

  /* side rotated label */
  .side-label {
    position: absolute;
    left: 14px;
    top: 68%;
    transform: translateY(-50%) rotate(-90deg);
    transform-origin: center;
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--ink);
    white-space: nowrap;
    letter-spacing: 0.04em;
  }
  .side-label.right { left: auto; right: 14px; transform: translateY(-50%) rotate(90deg); }
  .side-label::before, .side-label::after { content: ' · '; opacity: 0.6; }

  /* LOGO BAND */
  .logo-band {
    background: var(--yellow);
    padding: 26px 70px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 30px;
    position: relative;
    border-top: 1px solid rgba(26,26,26,0.08);
    border-bottom: 1px solid rgba(26,26,26,0.08);
  }
  .logo-band .logo {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--ink);
    letter-spacing: 0.02em;
    opacity: 0.85;
    transition: opacity 0.2s;
  }
  .logo-band .logo:hover { opacity: 1; }

  /* MISSION SECTION */
  .mission {
    background: var(--panel);
    position: relative;
  }
  .mission-text {
    padding: 56px 70px 56px;
    display: grid;
    grid-template-columns: 0.95fr 1.15fr;
    gap: 18px 80px;
    align-items: start;
    position: relative;
    max-width: none;
  }
  .mission-text > .pill-tag { grid-column: 1; grid-row: 1; align-self: start; margin-bottom: 8px; }
  .mission-text > .mission-h { grid-column: 1; grid-row: 2; }
  .mission-text > .mission-meta {
    grid-column: 1; grid-row: 3;
    margin-top: 14px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: var(--ink-2);
  }
  .mission-text > .mission-body {
    grid-column: 2;
    grid-row: 1 / span 3;
    max-width: 620px;
    margin-top: 60px;
    align-self: start;
  }
  .pill-tag {
    display: inline-block;
    background: var(--sage);
    color: var(--ink);
    padding: 6px 18px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.04em;
    align-self: flex-start;
    white-space: nowrap;
  }
  .mission-h {
    font-family: var(--serif);
    font-size: clamp(40px, 4.4vw, 60px);
    line-height: 1.02;
    letter-spacing: -0.01em;
  }
  .mission-body {
    font-size: 13.5px; line-height: 1.7;
    color: var(--ink-2);
  }

  /* Right side vertical labels strip */
  .mission-side-strip {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 38px;
    display: flex;
    border-left: 1px solid var(--rule);
  }
  .mission-side-strip > div {
    flex: 1;
    border-left: 1px solid var(--rule);
    display: grid;
    place-items: center;
    background: var(--panel-2);
  }
  .mission-side-strip > div:nth-child(2) { background: #E8D8B5; }
  .mission-side-strip > div:nth-child(3) { background: #EDC58B; }
  .mission-side-strip span {
    font-family: var(--serif);
    font-style: italic;
    font-size: 12px;
    transform: rotate(-90deg);
    white-space: nowrap;
    color: var(--ink);
  }

  /* MARQUEE */
  .marquee {
    background: var(--yellow-soft);
    border-top: 1px solid rgba(26,26,26,0.08);
    border-bottom: 1px solid rgba(26,26,26,0.08);
    padding: 18px 0;
    overflow: hidden;
    position: relative;
  }
  .marquee-track {
    display: flex;
    gap: 36px;
    white-space: nowrap;
    animation: scroll 28s linear infinite;
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
  }
  .marquee-track span { display: inline-flex; align-items: center; gap: 36px; }
  .marquee-track .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--coral); display: inline-block;
  }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* GRID PAPER SECTION HOLDING THE SERVICES WINDOW */
  .grid-section {
    background: var(--grid);
    background-image:
      linear-gradient(rgba(0,0,0,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    padding: 80px 70px 100px;
    position: relative;
  }
  .browser-window {
    background: var(--panel);
    border-radius: 14px;
    box-shadow: 0 26px 60px rgba(0,0,0,0.18), 0 6px 14px rgba(0,0,0,0.08);
    overflow: hidden;
    max-width: 880px;
    margin: 0 auto;
  }
  .browser-bar {
    background: #e8e2cd;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(26,26,26,0.08);
  }
  .browser-bar .lights { display: flex; gap: 7px; }
  .browser-bar .lights span {
    width: 11px; height: 11px; border-radius: 50%;
    background: #c8c0a9;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .browser-bar .url {
    flex: 1;
    text-align: center;
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink);
    font-style: italic;
  }
  .browser-body {
    padding: 14px 36px 30px;
  }
  .service-row {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    align-items: center;
    gap: 30px;
    padding: 28px 0;
    border-bottom: 1px solid rgba(26,26,26,0.1);
  }
  .service-row:last-child { border-bottom: none; }
  .service-num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 26px;
    color: var(--muted);
  }
  .service-name {
    font-family: var(--serif);
    font-size: 26px;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .service-desc {
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--ink-2);
    max-width: 480px;
  }
  .service-row .btn-pill-sage { padding: 9px 18px; font-size: 12px; }

  /* PROJECTS */
  .projects {
    background: var(--bg);
    padding: 100px 0 60px;
    position: relative;
  }
  .projects-head {
    padding: 0 70px 60px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 40px;
  }
  .projects-head .pill-tag { background: var(--panel); border: 1px solid var(--rule); }
  .projects-intro {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    line-height: 1.5;
    color: var(--ink-2);
    max-width: 380px;
    text-align: right;
  }

  .project {
    background: var(--panel);
    margin: 0 0 24px;
    padding: 50px 70px;
    position: relative;
    overflow: hidden;
  }
  .project.alt { background: var(--panel-2); }
  .project.dark {
    background: #1f1e1b;
    color: #FBF6E1;
  }
  .project.dark .project-num,
  .project.dark .project-title,
  .project.dark .project-body,
  .project.dark .project-tag,
  .project.dark .project-pill,
  .project.dark .metric-num,
  .project.dark .metric-label,
  .project.dark .frame-label { color: #FBF6E1; }
  .project.dark .project-body { color: rgba(251,246,225,0.7); }
  .project.dark .project-tag { background: #2a2925; color: rgba(251,246,225,0.8); border-color: rgba(251,246,225,0.1); }
  .project.dark .project-pill { background: rgba(251,246,225,0.08); color: rgba(251,246,225,0.65); }
  .project.dark .metric { background: var(--yellow); color: var(--ink); border-color: var(--yellow); }
  .project.dark .frame { background: #2a2925; border-color: rgba(251,246,225,0.1); }
  .project.dark .frame-label { color: rgba(251,246,225,0.4); }

  .project-grid {
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    gap: 56px;
    align-items: start;
  }
  .project.flip .project-grid {
    grid-template-columns: 1.15fr 1fr;
    direction: rtl;
  }
  .project.flip .project-grid > * { direction: ltr; }

  .project-copy { display: flex; flex-direction: column; gap: 22px; }

  .project-num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 64px;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
    opacity: 0.7;
  }
  .project-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--sage);
    color: var(--ink);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 11.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    align-self: flex-start;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .project-title {
    font-family: var(--serif);
    font-size: clamp(36px, 4.2vw, 56px);
    line-height: 1.0;
    letter-spacing: -0.01em;
    color: var(--ink);
    font-weight: 400;
  }
  .project-title em {
    font-family: var(--cursive);
    font-weight: 700;
    color: var(--coral);
    font-style: normal;
    display: inline-block;
    transform: rotate(-2deg);
    margin: 0 0.08em;
  }
  .project-body {
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--ink-2);
    max-width: 520px;
  }

  .metrics-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 4px;
  }
  .metrics-row.four { grid-template-columns: repeat(2, 1fr); }
  .metric {
    background: var(--yellow);
    border-radius: 12px;
    padding: 18px 18px;
    border: 1px solid rgba(26,26,26,0.06);
  }
  .metric-num {
    font-family: var(--serif);
    font-size: 28px;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--ink);
    font-weight: 400;
  }
  .metric-label {
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-2);
    margin-top: 8px;
    line-height: 1.3;
  }

  .pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .project-pill {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-2);
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* Image stack on right */
  .project-media {
    display: grid;
    gap: 14px;
  }
  .project-media .frame {
    background: var(--panel-2);
    border: 1px solid var(--rule);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  .frame-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 10px 14px;
    color: var(--muted);
    border-bottom: 1px solid var(--rule);
    background: rgba(0,0,0,0.02);
  }
